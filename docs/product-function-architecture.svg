<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1900" viewBox="0 0 1800 1900">
  <defs>
    <style>
      .bg { fill: #fffaf1; }
      .title { font: 800 44px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #3d2115; }
      .subtitle { font: 600 20px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #9b7359; }
      .section-title { font: 800 28px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #3d2115; }
      .node-title { font: 800 22px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #3d2115; }
      .node-text { font: 600 18px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #7b5b46; }
      .small { font: 600 16px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #8b6a54; }
      .pill-text { font: 800 18px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #8c4b32; }
      .card { fill: #ffffff; stroke: #eadbc5; stroke-width: 2; }
      .hub { fill: #fff1df; stroke: #d99b73; stroke-width: 3; }
      .band { fill: #f6ecd9; stroke: #eadbc5; stroke-width: 2; }
      .data { fill: #edf6ee; stroke: #96bd9c; stroke-width: 2.5; }
      .reward { fill: #fff0ef; stroke: #d78e7e; stroke-width: 2.5; }
      .flow { stroke: #c68b68; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .thin-flow { stroke: #d8b79d; stroke-width: 2.5; fill: none; marker-end: url(#arrow-soft); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c68b68"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d8b79d"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#8f6a4e" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect class="bg" width="1800" height="1900"/>
